version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: realestate-api
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./ml:/app/ml  # Mount model directory for persistence
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  ui:
    build:
      context: .
      dockerfile: streamlit_app/Dockerfile
    container_name: realestate-ui
    ports:
      - "${UI_PORT:-8501}:8501"
    depends_on:
      api:
        condition: service_healthy
    environment:
      - API_URL=http://api:8000
    volumes:
      - ./streamlit_app:/app/streamlit_app
    restart: unless-stopped